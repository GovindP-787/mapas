version: '3.8'

services:
  mapas-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mapas-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - FACE_VERIFICATION_THRESHOLD=0.45
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000,http://127.0.0.1:8000
      - INSIGHTFACE_MODEL=buffalo_l
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - mapas-network

networks:
  mapas-network:
    driver: bridge
